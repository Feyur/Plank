# Прод-развёртывание Plank. Образ plank:latest собирается локально и
# загружается на сервер (docker load). Наружу — Caddy (80 + HTTPS-порт),
# app и Postgres доступны только во внутренней docker-сети.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Тюнинг под малую RAM (сервер ~1 ГБ, делит память с другими сервисами).
    command: postgres -c shared_buffers=96MB -c max_connections=20
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  app:
    image: plank:latest
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      ACCESS_ADMIN_EMAILS: ${ACCESS_ADMIN_EMAILS:-vip@atank.ru,web@atank.ru}
      API_PORT: 3000
      COOKIE_SECURE: ${COOKIE_SECURE}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED}
      WEB_ORIGIN: ${WEB_ORIGIN}
      SEED_USERS: ${SEED_USERS}
    expose:
      - '3000'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    # 80 — для ACME HTTP-01 challenge и редиректа на HTTPS.
    # ${HTTPS_PORT} — для HTTPS (443/8443 заняты, берём свободный, напр. 9443).
    ports:
      - '80:80'
      - '${HTTPS_PORT}:${HTTPS_PORT}'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
